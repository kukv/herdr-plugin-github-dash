version: "2"

linters:
  default: standard
  enable:
    - revive
    - gosec
    - misspell
    - gocritic
    - bodyclose
    - unconvert
    - unparam
  settings:
    gosec:
      excludes:
        - G204
  exclusions:
    rules:
      - linters:
          - revive
        text: "^(exported|unused-parameter):"
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
