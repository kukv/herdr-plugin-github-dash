version: "2"

linters:
  default: standard
  enable:
    - revive
    - gosec
    - misspell
    - gocritic
    - bodyclose
    - unconvert
    - unparam
  exclusions:
    rules:
      - linters:
          - revive
        text: "^(exported|unused-parameter):"
      - path: _test\.go
        linters:
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofumpt
    - goimports
